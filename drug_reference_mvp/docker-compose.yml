version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: drug_ref_db
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/drug_ref_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - JWT_SECRET=dev-jwt-secret-change-in-prod
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_store
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3005:3005"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host --port 3005"
    environment:
      - VITE_API_URL=http://localhost:8005
      - VITE_STRIPE_PK=${STRIPE_PUBLISHABLE_KEY}
volumes:
  postgres_data:
  chroma_data:
