version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: concierge_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/concierge_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/chroma_store
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host --port 3001"
    environment:
      - VITE_API_URL=http://localhost:8001
volumes:
  postgres_data:
  chroma_data:
