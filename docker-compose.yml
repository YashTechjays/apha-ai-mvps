version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/churn_db
      - SECRET_KEY=dev-secret-key-change-in-prod
      - MLFLOW_TRACKING_URI=./mlruns
      - AWS_S3_BUCKET=apha-churn-models
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - mlflow_data:/app/mlruns
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
volumes:
  postgres_data:
  mlflow_data:
