version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: apha_master_db
    ports:
      - "5432:5432"
    volumes:
      - master_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  backend:
    build: ./master-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/apha_master_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.postmarkapp.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@pharmacist.com}
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - MLFLOW_TRACKING_URI=./mlruns
      - SECRET_KEY=dev-secret-key
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./master-backend:/app
      - master_mlflow_data:/app/mlruns
      - master_chroma_data:/app/chroma_store
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build: ./master-frontend
    ports:
      - "3100:3100"
    volumes:
      - ./master-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
volumes:
  master_postgres_data:
  master_mlflow_data:
  master_chroma_data:
