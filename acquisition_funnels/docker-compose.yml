version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: acquisition_db
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/acquisition_db
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=hello@pharmacist.com
      - FRONTEND_URL=http://localhost:3006
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3006:3006"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host --port 3006"
    environment:
      - VITE_API_URL=http://localhost:8006

volumes:
  postgres_data:
