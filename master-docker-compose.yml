version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: apha_master_db
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
    ports:
      - "5440:5432"
    volumes:
      - master_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha -d apha_master_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./master-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://apha:apha_secret@postgres:5432/apha_master_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      JWT_SECRET: dev-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_NAME: gpt-4o-mini
      SMTP_HOST: ${SMTP_HOST:-smtp.postmarkapp.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: noreply@pharmacist.com
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ACQ_SALARY_FREE_CHECKS_PER_DAY: "3"
      ACQ_INTERACTION_FREE_CHECKS_PER_DAY: "3"
      ACQ_CAREER_FREE_ASSESSMENTS_PER_DAY: "1"
      CHROMA_PERSIST_DIR: /app/chroma_store
      FRONTEND_URL: http://localhost:3100
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./master-backend:/app
      - master_chroma_data:/app/chroma_store
      - master_mlflow_data:/app/mlruns

  frontend:
    build:
      context: ./master-frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  master_postgres_data:
  master_chroma_data:
  master_mlflow_data:
