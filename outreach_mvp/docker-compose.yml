version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: apha
      POSTGRES_PASSWORD: apha_secret
      POSTGRES_DB: outreach_db
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/outreach_db
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_WEBHOOK_SECRET=${SENDGRID_WEBHOOK_SECRET}
      - FROM_EMAIL=membership@pharmacist.com
      - FROM_NAME=APhA Membership Team
      - PHYSICAL_ADDRESS=2215 Constitution Ave NW, Washington, DC 20037
      - SECRET_KEY=dev-secret-key
      - ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - mlflow_data:/app/mlruns
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload

  celery_worker:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/outreach_db
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=membership@pharmacist.com
      - FROM_NAME=APhA Membership Team
      - ENV=development
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A delivery.tasks worker --loglevel=info --concurrency=4

  celery_beat:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://apha:apha_secret@postgres:5432/outreach_db
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A delivery.tasks beat --loglevel=info

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3007:3007"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host --port 3007"
    environment:
      - VITE_API_URL=http://localhost:8007

volumes:
  postgres_data:
  mlflow_data:
